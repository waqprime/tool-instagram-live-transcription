name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-light.txt

      - name: Inject app token
        env:
          BUILTIN_APP_TOKEN: ${{ secrets.BUILTIN_APP_TOKEN }}
        shell: bash
        run: echo -n "$BUILTIN_APP_TOKEN" > .app_token

      - name: Install Electron dependencies
        run: |
          cd electron-app
          npm install

      - name: Update version in package.json
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd electron-app
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build for Windows
        env:
          BUILTIN_APP_TOKEN: ${{ secrets.BUILTIN_APP_TOKEN }}
        run: |
          cd electron-app
          npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            electron-app/dist/*.exe
            !electron-app/dist/*.blockmap

  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-light.txt

      - name: Inject app token
        env:
          BUILTIN_APP_TOKEN: ${{ secrets.BUILTIN_APP_TOKEN }}
        run: echo -n "$BUILTIN_APP_TOKEN" > .app_token

      - name: Install Apple Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$MACOS_CERTIFICATE_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$MACOS_CERTIFICATE_PWD" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_CERTIFICATE_PWD" build.keychain

      - name: Install Electron dependencies
        run: |
          cd electron-app
          npm install

      - name: Update version in package.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd electron-app
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build for macOS arm64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          BUILTIN_APP_TOKEN: ${{ secrets.BUILTIN_APP_TOKEN }}
        run: |
          cd electron-app
          npm run build:mac-arm64

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            electron-app/dist/*.dmg
            electron-app/dist/*.zip
            !electron-app/dist/*.blockmap

  release:
    needs: [build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete existing release if it exists
        continue-on-error: true
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release $RELEASE_ID"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID
          else
            echo "No existing release found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/**/*
            artifacts/macos-arm64-build/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
